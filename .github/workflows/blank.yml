name: RDP_TIPSUNIX

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install and Configure XRDP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xrdp \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            xfce4-session \
            xorg \
            x11-xserver-utils

          # FIX 1: Override startwm.sh — cara paling andal agar XFCE4 terbaca xrdp
          sudo bash -c 'cat > /etc/xrdp/startwm.sh << EOF
#!/bin/sh
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
export XDG_CONFIG_DIRS=/etc:\$XDG_CONFIG_DIRS
exec startxfce4
EOF'
          sudo chmod +x /etc/xrdp/startwm.sh

          # FIX 2: .xsession global sebagai fallback
          echo "startxfce4" | sudo tee /etc/skel/.xsession
          sudo chmod +x /etc/skel/.xsession

          # FIX 3: Pastikan direktori xfce4 session ada
          sudo mkdir -p /etc/xdg/xfce4/
          sudo mkdir -p /usr/share/xsessions/

          # FIX 4: Daftarkan sesi XFCE4
          if [ ! -f /usr/share/xsessions/xfce.desktop ]; then
            sudo bash -c 'cat > /usr/share/xsessions/xfce.desktop << EOF
[Desktop Entry]
Name=Xfce Session
Comment=Use this session to run Xfce as your desktop environment
Exec=startxfce4
Icon=
Type=Application
EOF'
          fi

          # FIX 5: Tambahkan xrdp ke group ssl-cert agar tidak error sertifikat
          sudo adduser xrdp ssl-cert || true

          # Aktifkan dan restart xrdp
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp
          sudo systemctl status xrdp --no-pager

          # Buka port RDP
          sudo ufw allow 3389/tcp || true

      - name: Create RDP User with Secure Password
        run: |
          # FIX 6: Generate password pakai dd — tanpa "tr: write error: Broken pipe"
          UPPER=$(   cat /dev/urandom | LC_ALL=C tr -dc 'A-Z'    | dd bs=1 count=4 2>/dev/null)
          LOWER=$(   cat /dev/urandom | LC_ALL=C tr -dc 'a-z'    | dd bs=1 count=4 2>/dev/null)
          NUMBERS=$( cat /dev/urandom | LC_ALL=C tr -dc '0-9'    | dd bs=1 count=4 2>/dev/null)
          SPECIAL=$( cat /dev/urandom | LC_ALL=C tr -dc '@#$%^&' | dd bs=1 count=4 2>/dev/null)

          # Acak urutan semua karakter
          PASSWORD=$(printf '%s' "${UPPER}${LOWER}${NUMBERS}${SPECIAL}" \
            | fold -w1 | shuf | tr -d '\n')

          # Buat user rdpuser
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:${PASSWORD}" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          # FIX 7: Set .xsession dan .xsessionrc per-user
          sudo bash -c 'cat > /home/rdpuser/.xsession << EOF
#!/bin/sh
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
export XDG_CONFIG_DIRS=/etc:\$XDG_CONFIG_DIRS
exec startxfce4
EOF'
          sudo bash -c 'echo "startxfce4" > /home/rdpuser/.xsessionrc'
          sudo chmod +x /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsessionrc

          # Buat direktori config XFCE4 untuk user
          sudo mkdir -p /home/rdpuser/.config/xfce4
          sudo chown -R rdpuser:rdpuser /home/rdpuser/.config

          echo "RDP_CREDS=User: rdpuser | Password: ${PASSWORD}" >> $GITHUB_ENV

          # Verifikasi user berhasil dibuat
          if ! id rdpuser &>/dev/null; then
            echo "::error::User creation failed"
            exit 1
          fi

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-runner-${{ github.run_id }}

          # Tunggu Tailscale mendapat IP
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ "$RETRIES" -lt 10 ]; do
            TS_IP=$(tailscale ip -4 2>/dev/null || true)
            sleep 5
            RETRIES=$((RETRIES + 1))
          done

          if [ -z "$TS_IP" ]; then
            echo "::error::Tailscale IP not assigned. Exiting."
            exit 1
          fi
          echo "TAILSCALE_IP=${TS_IP}" >> $GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"

          if ! nc -zv "$TAILSCALE_IP" 3389 2>&1; then
            echo "::error::TCP connection to RDP port 3389 failed"
            exit 1
          fi
          echo "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== RDP ACCESS ==="
          echo "http://www.youtube.com/@TipsUNIX"
          echo "Address  : $TAILSCALE_IP"
          echo "Username : rdpuser"
          echo "Password : $RDP_CREDS"
          echo "=================="
          echo ""

          # Jaga runner tetap aktif sampai workflow dibatalkan manual
          while true; do
            echo "[$(date)] RDP Active - Cancel workflow to terminate"
            sleep 300
          done
