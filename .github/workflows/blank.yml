name: RDP_TIPSUNIX

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install and Configure XRDP
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            xorg

          # FIX 1: Sisipkan perintah unset ke startwm.sh bawaan tanpa menghapus konfigurasi default Ubuntu
          sudo sed -i.bak '/test -x \/etc\/X11\/Xsession/i unset DBUS_SESSION_BUS_ADDRESS\nunset XDG_RUNTIME_DIR' /etc/xrdp/startwm.sh

          # FIX 2: Jadikan XFCE4 sebagai default session untuk user baru
          echo "startxfce4" | sudo tee /etc/skel/.xsession
          sudo chmod +x /etc/skel/.xsession

          # FIX 3: Tambahkan xrdp ke group ssl-cert
          sudo adduser xrdp ssl-cert || true

          # Aktifkan dan restart xrdp
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp
          sudo ufw allow 3389/tcp || true

      - name: Create RDP User with Static Password
        run: |
          # Set password manual
          PASSWORD="Aldiaz15"

          # Buat user rdpuser
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:${PASSWORD}" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          # Terapkan session XFCE4 secara spesifik untuk rdpuser
          echo "startxfce4" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          # Simpan password ke environment GitHub
          echo "RDP_PASSWORD=${PASSWORD}" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-runner-${{ github.run_id }}

          # Tunggu Tailscale mendapat IP
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ "$RETRIES" -lt 10 ]; do
            TS_IP=$(tailscale ip -4 2>/dev/null || true)
            sleep 5
            RETRIES=$((RETRIES + 1))
          done

          if [ -z "$TS_IP" ]; then
            echo "::error::Tailscale IP not assigned. Exiting."
            exit 1
          fi
          echo "TAILSCALE_IP=${TS_IP}" >> $GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"

          if ! nc -zv "$TAILSCALE_IP" 3389 2>&1; then
            echo "::error::TCP connection to RDP port 3389 failed"
            exit 1
          fi
          echo "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== RDP ACCESS ==="
          echo "http://www.youtube.com/@TipsUNIX"
          echo "Address  : $TAILSCALE_IP"
          echo "Username : rdpuser"
          echo "Password : $RDP_PASSWORD"
          echo "=================="
          echo ""

          # Jaga runner tetap aktif
          while true; do
            echo "[$(date)] RDP Active - Cancel workflow to terminate"
            sleep 300
          done
